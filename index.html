<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO & identidade -->
    <title>LogMax - Gestão de Compras</title>
    <meta name="description" content="Plataforma de gestão de compras, estoque e financeiro para empresas." />
    <meta name="author" content="LogMax" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10B981" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LogMax" />

    <!-- Ícones -->
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />

    <!-- Evita FOUC: aplica tema persistido ANTES do React montar.
         Sem isto, light mode flashava com bg/sombras dark antes do useEffect rodar. -->
    <script>
      (function () {
        var ACCENT_HEX = {
          green:  '#10B981', yellow: '#FACC15', purple: '#A855F7',
          orange: '#F97316', blue:   '#3B82F6', pink:   '#EC4899'
        };
        try {
          var t = localStorage.getItem('logmax-theme');
          var a = localStorage.getItem('logmax-accent');
          if (t === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.documentElement.style.backgroundColor = '#E8E8E8';
          } else {
            document.documentElement.style.backgroundColor = '#0A0A0A';
          }
          if (a) document.documentElement.setAttribute('data-accent', a);
          if (a && ACCENT_HEX[a]) {
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', ACCENT_HEX[a]);
          }
        } catch (e) {
          document.documentElement.style.backgroundColor = '#0A0A0A';
        }
      })();
    </script>

    <!-- Identidade própria de PWA para /simulador-pagamento — DEVE rodar antes
         do parsing do <link rel="manifest"> ter efeito no browser para evitar
         "Esse app já está instalado". Por isso fica em script inline no head. -->
    <script>
      (function () {
        if (window.location.pathname !== '/simulador-pagamento') return;
        function set(sel, attr, val) {
          var el = document.querySelector(sel);
          if (el) el.setAttribute(attr, val);
        }
        set('link[rel="manifest"]',                   'href',    '/simulador-manifest.json');
        set('link[rel="apple-touch-icon"]',           'href',    '/simulador-icon.svg');
        set('link[rel="icon"]',                       'href',    '/simulador-icon.svg');
        set('meta[name="theme-color"]',               'content', '#3B82F6');
        set('meta[name="apple-mobile-web-app-title"]','content', 'Banco Simulado');
        document.title = 'Banco Simulado — Pagamento Pix';
      })();
    </script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
