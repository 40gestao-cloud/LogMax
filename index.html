<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO & identidade -->
    <title>LogMax - Gestão de Compras</title>
    <meta name="description" content="Plataforma de gestão de compras, estoque e financeiro para empresas." />
    <meta name="author" content="LogMax" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10B981" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LogMax" />

    <!-- Ícones -->
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />

    <!-- Evita FOUC: aplica tema persistido ANTES do React montar.
         Sem isto, light mode flashava com bg/sombras dark antes do useEffect rodar. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('logmax-theme');
          var a = localStorage.getItem('logmax-accent');
          if (t === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.documentElement.style.backgroundColor = '#E8E8E8';
          } else {
            document.documentElement.style.backgroundColor = '#0A0A0A';
          }
          if (a) document.documentElement.setAttribute('data-accent', a);
        } catch (e) {
          document.documentElement.style.backgroundColor = '#0A0A0A';
        }
      })();
    </script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
